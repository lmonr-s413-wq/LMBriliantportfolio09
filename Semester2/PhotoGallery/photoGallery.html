<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Photo Gallery</title>
  </head>

  <body>
      

    <style>
                  h1 {
       text-align: center;}

          .gallery
       {   background-color: lightblue;
       border: 4px solid black;
       width:90%
      max-width:1280px;
      margin:auto;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      }
                    figure
                    {
            background-color: white;
            width: 100%;
            max-width: 250px;
            padding:1rem;
            margin:1rem;

            }
            figcaption
            {
                text-align: center;
                color: black;
                padding: .5rem;
            }
            img
            {
              width: 100%;
              aspect-ratio: 1 / 1;
            }

    </style>
  </head>
  <body>
    <h1>Flexbox Photo Gallery</h1>
    <div class="Gallery">
